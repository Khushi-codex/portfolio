<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Robot Avatar — Cursor Eye Tracking Demo</title>
<style>
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#09090b; font-family:sans-serif;
  }
  .avatar-wrap{
    position:relative;
    width:360px; height:360px;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 0 60px -10px rgba(139,92,246,0.55), 0 0 0 2px rgba(139,92,246,0.35);
  }
  .avatar-wrap img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  /* Eye highlight dots — positioned as % of the image based on the actual
     pixel coordinates of the robot's eyes (measured from the source image) */
  .eye-highlight{
    position:absolute;
    width:9px; height:9px;
    border-radius:50%;
    background:radial-gradient(circle, #ffffff 0%, #e9d5ff 45%, rgba(233,213,255,0) 75%);
    box-shadow:0 0 8px 2px rgba(233,213,255,0.9);
    transform:translate(-50%, -50%);
    pointer-events:none;
    transition:transform 0.06s linear;
  }
  .eye-left{  left:39.9%; top:41.6%; }
  .eye-right{ left:60.0%; top:41.9%; }
</style>
</head>
<body>

  <div class="avatar-wrap" id="avatarWrap">
    <img src="avatar.png" alt="Robot avatar">
    <div class="eye-highlight eye-left"  id="eyeLeft"></div>
    <div class="eye-highlight eye-right" id="eyeRight"></div>
  </div>

<script>
  const wrap = document.getElementById('avatarWrap');
  const eyeLeft = document.getElementById('eyeLeft');
  const eyeRight = document.getElementById('eyeRight');

  // Max distance (in px) the highlight is allowed to drift from its resting
  // position, so it stays inside the glowing eye socket in the image.
  const MAX_SHIFT = 3.2;

  function moveEyes(clientX, clientY){
    const rect = wrap.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    // direction from avatar center to cursor, normalized and clamped
    let dx = clientX - cx;
    let dy = clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const clampedDist = Math.min(dist, 220); // beyond this distance, no extra movement
    const nx = (dx / dist) * (clampedDist / 220);
    const ny = (dy / dist) * (clampedDist / 220);

    const shiftX = nx * MAX_SHIFT;
    const shiftY = ny * MAX_SHIFT;

    eyeLeft.style.transform  = `translate(calc(-50% + ${shiftX}px), calc(-50% + ${shiftY}px))`;
    eyeRight.style.transform = `translate(calc(-50% + ${shiftX}px), calc(-50% + ${shiftY}px))`;
  }

  window.addEventListener('mousemove', (e) => moveEyes(e.clientX, e.clientY));

  // Basic touch support: eyes follow finger while dragging on mobile
  window.addEventListener('touchmove', (e) => {
    if (e.touches[0]) moveEyes(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive:true });
</script>

</body>
</html>
